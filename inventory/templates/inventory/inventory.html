{% extends 'inventory/base.html' %}

{% block title %}Inventory - SuperShop{% endblock %}

{% block content %}
<div class="page-title">
    <i class="bi bi-archive"></i>
    <h2 class="mb-0">Inventory</h2>
</div>

<form method="get" class="mb-4">
    <div class="input-group">
        <input type="text" class="form-control" name="search" placeholder="Search products..." value="{{ request.GET.search }}">
        <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
    </div>
</form>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventory %}
            <tr class="{% if item.quantity < 10 %}table-danger{% endif %}">
                <td>{{ item.product.product_name }}</td>
                <td>{{ item.quantity }}{% if item.quantity < 10 %} <span class="badge bg-danger">Low Stock</span>{% endif %}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>
</div>
{% endblock %}
